services:
  - type: web
    name: ai-office-server
    runtime: node
    buildCommand: npm install && npm run build:server
    startCommand: node build/server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SERVER_DAILY_TOKEN_LIMIT
        value: "0"
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        value: teo116-ceo
      - key: GITHUB_REPO
        value: ai-office
